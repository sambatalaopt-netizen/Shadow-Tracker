<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW TRACKER | BIO-AUDIT</title>
    <style>
        :root { --bg: #050505; --accent: #FF003C; --limit: #FFD700; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #header { padding: 15px; border-bottom: 1px solid #111; text-align: center; background: #000; letter-spacing: 5px; color: #444; font-size: 0.8rem; }
        canvas { width: 100vw; height: calc(100vh - 120px); display: block; }
        .footer { height: 60px; background: #080808; border-top: 1px solid #111; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #555; letter-spacing: 2px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        button { background: var(--accent); color: white; border: none; padding: 20px 60px; cursor: pointer; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="overlay"><button onclick="start()">LANSEAZĂ AUDITUL</button></div>
    <div id="header">SHADOW TRACKER v2.2 | ANALIZĂ BIOMETRICĂ ÎN TIMP REAL</div>
    <canvas id="visualizer"></canvas>
    <div class="footer" id="status-bar">SISTEM ÎN AȘTEPTARE...</div>

<script>
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    let audioCtx, analyser, freqArray;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 120;
    }
    window.onresize = resize; resize();

    async function start() {
        document.getElementById('overlay').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; // Mai putine bare, dar mai late si mai vizibile
        source.connect(analyser);
        freqArray = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(freqArray);
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const limitY = canvas.height * 0.35; // Linia la 65% inaltime
        let barWidth = canvas.width / freqArray.length;
        let stressFound = false;

        for(let i = 0; i < freqArray.length; i++) {
            let barHeight = (freqArray[i] / 255) * canvas.height;
            let currentY = canvas.height - barHeight;

            if (currentY < limitY) {
                ctx.fillStyle = '#FF003C';
                stressFound = true;
            } else {
                ctx.fillStyle = '#111';
            }
            ctx.fillRect(i * barWidth, currentY, barWidth - 2, barHeight);
        }

        // LINIA GALBENĂ
        ctx.strokeStyle = '#FFD700';
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(canvas.width, limitY); ctx.stroke();
        
        if (stressFound) {
            statusBar.innerText = "ANOMALIE DETECTATĂ: DEPĂȘIRE PRAG INTEGRITATE";
            statusBar.style.color = "#FF003C";
        } else {
            statusBar.innerText = "MONITORIZARE: SEMNAL ÎN PARAMETRI NORMALI";
            statusBar.style.color = "#555";
        }
    }
</script>
</body>
</html>
