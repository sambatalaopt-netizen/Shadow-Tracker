<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW TRACKER | 4K PRECIS</title>
    <style>
        :root { --bg: #050505; --accent: #FF003C; --limit: #FFD700; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 15px; border-bottom: 1px solid #111; text-align: center; background: #000; letter-spacing: 5px; color: #222; font-size: 0.8rem; }
        canvas { width: 100vw; flex-grow: 1; display: block; }
        .footer { height: 60px; background: #080808; border-top: 1px solid #111; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        button { background: var(--accent); color: white; border: none; padding: 20px 60px; cursor: pointer; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="overlay"><button onclick="start()">INIȚIAZĂ AUDITUL</button></div>
    <div id="header">SHADOW TRACKER | BIO-STRESS ANALYZER v2.8</div>
    <canvas id="visualizer"></canvas>
    <div class="footer" id="status-bar">SISTEM ÎN AȘTEPTARE...</div>

<script>
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const statusBar = document.getElementById('status-bar');
    let audioCtx, analyser, freqArray;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 120;
    }
    window.onresize = resize; 
    resize();

    async function start() {
        document.getElementById('overlay').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        
        // Reducem FFT pentru a avea bare mai puține, dar MULT MAI LATE pe 4K
        analyser.fftSize = 128; 
        analyser.smoothingTimeConstant = 0.8;
        source.connect(analyser);
        freqArray = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }

    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(freqArray);
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const limitY = canvas.height * 0.25; // Linia galbenă sus (la 75% din ecran)
        
        // CALCUL MATEMATIC PENTRU UMPLERE TOTALĂ (4K)
        let barWidth = canvas.width / freqArray.length;
        let stressDetected = false;

        for(let i = 0; i < freqArray.length; i++) {
            let val = freqArray[i] > 50 ? freqArray[i] : 0; // Noise gate
            let barHeight = (val / 255) * canvas.height;
            let x = i * barWidth;
            let y = canvas.height - barHeight;

            if (y < limitY && i > 2) {
                ctx.fillStyle = '#FF003C';
                stressDetected = true;
            } else {
                ctx.fillStyle = '#111';
            }
            // Desenăm barele lipite (fără spațiu) pentru a umple televizorul
            ctx.fillRect(x, y, barWidth + 1, barHeight);
        }

        // LINIA GALBENĂ
        ctx.strokeStyle = '#FFD700';
        ctx.setLineDash([20, 20]);
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(canvas.width, limitY); ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
        ctx.font = '14px Courier New';
        ctx.fillText("LIMITĂ INTEGRITATE DISCURS", 20, limitY - 15);

        if (stressDetected) {
            statusBar.innerText = "ANOMALIE DETECTATĂ";
            statusBar.style.color = "#FF003C";
        } else {
            statusBar.innerText = "MONITORIZARE: SEMNAL STABIL";
            statusBar.style.color = "#444";
        }
    }
</script>
</body>
</html>
